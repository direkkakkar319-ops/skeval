name: Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Weekly

jobs:
  security-audit:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || vars.ENABLE_AUTO_CI == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit pip-licenses
        pip install -e .
    - name: Run Bandit
      run: bandit -r src/ -ll
    - name: Vulnerability Audit (pip-audit)
      # CVE-2026-3219 affects pip 26.0.1 — no fix version released yet, ignored until patch is available
      run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219
    - name: License Compliance Check
      run: pip-licenses --format=markdown > licenses.md
