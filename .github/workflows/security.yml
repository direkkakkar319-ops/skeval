name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Weekly

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install tools
      run: |
        pip install bandit pip-audit pip-licenses
        pip install -e .
    - name: Run Bandit
      run: bandit -r src/ -ll
    - name: Vulnerability Audit (pip-audit)
      run: pip-audit
    - name: License Compliance Check
      run: pip-licenses --format=markdown > licenses.md
