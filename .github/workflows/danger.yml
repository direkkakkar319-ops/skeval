name: "Danger JS"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  danger:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Danger
        uses: danger/danger-js-action@12.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
