name: Auto Assign Collaborators

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign-collaborators:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request review from all collaborators
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all collaborators for the repository
            const collaborators = await github.rest.repos.listCollaborators({
              owner: context.repo.owner,
              repo: context.repo.repo,
              affiliation: 'direct' // Direct collaborators
            });
            
            // Extract usernames, excluding the PR author
            const reviewers = collaborators.data
              .map(user => user.login)
              .filter(login => login !== context.payload.pull_request.user.login);
              
            if (reviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: reviewers
              });
              
              // Also add the PR author as the Assignee
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: [context.payload.pull_request.user.login]
              });
              
              console.log(`Requested review from: ${reviewers.join(', ')}`);
            } else {
              console.log("No other collaborators found to assign as reviewers.");
            }
