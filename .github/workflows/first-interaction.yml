name: First Interaction Greeter

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  greeter:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to Sentinel-AI! 🎉 Thank you for opening your very first issue. A maintainer will be with you shortly. If you plan to contribute code, please check out our CONTRIBUTING.md file."
          pr-message: "Welcome to Sentinel-AI! 🎉 Thank you for your very first Pull Request. We are thrilled to have you! Please ensure you have read our CONTRIBUTING.md file. A maintainer will review your code soon."
