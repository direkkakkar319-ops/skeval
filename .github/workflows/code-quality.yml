name: Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy vulture pydocstyle codespell
    - name: Run Reviewdog (Black)
      if: github.event_name == 'pull_request'
      uses: reviewdog/action-black@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review

    - name: Run Reviewdog (Flake8)
      if: github.event_name == 'pull_request'
      uses: reviewdog/action-flake8@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review

    - name: Check code formatting with Black (Push)
      if: github.event_name != 'pull_request'
      run: black --check .
    - name: Check imports with isort
      run: isort --check-only .
    - name: Lint with flake8 (Push)
      if: github.event_name != 'pull_request'
      run: flake8 .
    - name: Type Checking with mypy
      run: mypy . || true
    - name: Dead Code Detection with vulture
      run: vulture . --min-confidence 80 || true
    - name: Docstring Style Check
      run: pydocstyle . || true
    - name: Spelling Check
      run: codespell . || true
