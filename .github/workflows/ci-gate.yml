name: CI Gate

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/run-ci')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: write

    steps:
      - name: Check commenter permission
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['admin', 'write'].includes(data.permission);
            core.setOutput('allowed', allowed);

      - name: Reject unauthorized user
        if: steps.permission.outputs.allowed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⛔ Only collaborators with write access can trigger CI.',
            });

      - name: Get PR branch
        if: steps.permission.outputs.allowed == 'true'
        id: branch
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.head.ref);

      - name: Trigger CI checks
        if: steps.permission.outputs.allowed == 'true'
        run: |
          gh workflow run ci.yml --ref ${{ steps.branch.outputs.ref }}
          gh workflow run tests.yml --ref ${{ steps.branch.outputs.ref }}
          gh workflow run code-quality.yml --ref ${{ steps.branch.outputs.ref }}
          gh workflow run security.yml --ref ${{ steps.branch.outputs.ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React with rocket
        if: steps.permission.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
