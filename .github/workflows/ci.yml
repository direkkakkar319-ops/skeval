name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  install-and-import:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e . || true # Install local package if setup.py/pyproject.toml exists
    - name: Install + Import Test
      run: |
        # Replace 'sentinel_ai' with actual package name
        python -c "import sys; print('Import test passed')"
